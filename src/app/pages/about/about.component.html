<div class="container">
  <div class="background-animation">
    <img *ngFor="let image of shuffledImages" [src]="image.src" [style.left]="image.left" [style.animation-delay]="image.animationDelay" alt="Background Image" />
  </div>
  <div class="aboutSection">
    <span class="headlineText">{{ "headlineAbout" | translate }}</span>
    <div class="section">
      <p>{{ "professionalIntensiveHeadline" | translate }}</p>
      <span>
        {{ "professionalIntensiveText" | translate }}
      </span>
    </div>
    <div class="btnContainer">
      <button (click)="navigateToContact()" class="btn btnAbout">
        {{ "btn" | translate }}
      </button>
    </div>
  </div>
</div>
