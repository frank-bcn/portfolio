<div class="container">
  <div class="language"></div>
  <div class="infoSection">
    <section>
      <div class="text">
        <div class="containerImg">
          <img
            draggable="false"
            (contextmenu)="ss.preventContextMenu($event)"
            class="img"
            src="/assets/ images/etc_images/background.png"
          />
        </div>
        <div class="textContainer">
          <div class="headlineText">
            <div class="textbar">Frank Sinnigen</div>
          </div>
          <p>&lt;p&gt;{{ "slogan" | translate }}&lt;/p&gt;</p>
          <button [routerLink]="['/about']" class="btn btnStart">
            {{ "btnText" | translate }}
          </button>
        </div>
      </div>
    </section>
  </div>
</div>
