<div class="container">
  <div class="contactContainer">
    <div
      class="contactDataContainer"
      [ngClass]="ss.active ? 'slide-in' : 'slide-out'"
      *ngIf="!ss.active"
    >
      <div class="headlineTextContakt">
        {{ "headlineContact" | translate }}
      </div>
      <div class="contactInformationContainer">
        <div class="map">
          <img
            draggable="false"
            (contextmenu)="ss.preventContextMenu($event)"
            src="/assets/ images/etc_images/map.png"
            class="legend"
          />
        </div>
        <div class="infoContainer">
          <span class="information">
            <p class="headlineInformation">Frank Sinnigen</p>
          </span>
          <div class="contactInformation">
            <address>
              <p class="address">{{ "address" | translate }}</p>
              <p class="address">{{ "email" | translate }}</p>
              <p [routerLink]="['/imprint']" class="address imprint">
                <b>{{ "imprint" | translate }}</b>
              </p>
            </address>
          </div>
        </div>
      </div>
      <div class="socialMedia">
        <div class="socialContainer">
          <a
            draggable="false"
            href="https://www.linkedin.com/in/frank-sinnigen/"
            target="_blank"
            class="btn btnSocial"
            >LinkedIn
            <img
              draggable="false"
              (contextmenu)="ss.preventContextMenu($event)"
              src="/assets/ images/etc_images/linkedIn.png"
            />
          </a>

          <a
            draggable="false"
            href="https://github.com/frank-bcn"
            target="_blank"
            class="btn btnSocial"
          >
            GitHub
            <img
              draggable="false"
              (contextmenu)="ss.preventContextMenu($event)"
              src="/assets/ images/skills_images/github.png"
            />
          </a>
        </div>
      </div>
    </div>
    <div class="contactSendContainer">
      <div
        class="formSection"
        [ngClass]="ss.active ? 'slide-in' : 'slide-out'"
        *ngIf="ss.active || !ss.tapView"
      >
        <app-message-form></app-message-form>
      </div>
    </div>
    <button class="btn switchButton" (click)="ss.switch()" *ngIf="ss.tapView">
      <div>
        <span class="arrow arrow-right">&gt;</span>
        <span class="arrow arrow-right">&gt;</span>
      </div>

      {{
        ss.active
          ? ("changeInfoBtn" | translate)
          : ("changeSendBtn" | translate)
      }}
      <div>
        <span class="arrow arrow-left">&lt;</span>
        <span class="arrow arrow-left">&lt;</span>
      </div>
    </button>
  </div>
</div>
