<div class="container">
  <div class="slider-container">
    <div class="descriptionHeadline">{{ "btnCertificate" | translate }}</div>
    <div
      class="slider"
      [style.transform]="'translateX(-' + currentIndex * 100 + '%)'"
    >
      <div
        class="slide"
        *ngFor="let image of images; let i = index"
        [class.active]="i === currentIndex"
      >
        <img [src]="image" alt="Image {{ i + 1 }}" />
      </div>
    </div>
  </div>
  <div class="sliderControls">
    <div class="controlBtn btn" style="font-size: 24px;" (click)="prev()">&lt;</div>
    <div class="slideCounter">{{ currentIndex + 1 }} / {{ images.length }}</div>
    <div class="controlBtn btn" style="font-size: 24px;" (click)="next()">&gt;</div>
  </div>
</div>
