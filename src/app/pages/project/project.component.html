<div class="container">
  <div class="sectionContainer">
    <div class="menu">
      <span class="headlineText headline">{{
        ls.getCurrentLanguage()?.headline
      }}</span>

        <button
          class="btn btnSkill"
          (click)="switchProject('project1')"
          [ngClass]="{ active: currentProject === 'project1' }"
        >
          {{ ls.getCurrentLanguage()?.btnProject1 }}
        </button>
        <button
          class="btn btnSkill"
          (click)="switchProject('project2')"
          [ngClass]="{ active: currentProject === 'project2' }"
        >
          {{ ls.getCurrentLanguage()?.btnProject2 }}
        </button>
        <button
          class="btn btnSkill"
          (click)="switchProject('project3')"
          [ngClass]="{ active: currentProject === 'project3' }"
        >
          {{ ls.getCurrentLanguage()?.btnProject3 }}
        </button>

        <button
          class="btn btnSkill"
          (click)="switchProject('project4')"
          [ngClass]="{ active: currentProject === 'project4' }"
        >
          {{ ls.getCurrentLanguage()?.btnProject4 }}
        </button>
        <button
          class="btn btnSkill"
          (click)="switchProject('project5')"
          [ngClass]="{ active: currentProject === 'project5' }"
        >
          {{ ls.getCurrentLanguage()?.btnProject5 }}
        </button>
    </div>
    <div class="section" [@slideAnimation]="currentProject">
      <div *ngIf="currentProject === 'project1'" class="sliderContainer">
        <app-project-pollo></app-project-pollo>
      </div>
      <div *ngIf="currentProject === 'project2'" class="sliderContainer">
        <app-join></app-join>
      </div>

      <div *ngIf="currentProject === 'project3'" class="sliderContainer">
        <p class="">
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Deleniti aut
          facilis autem enim ex nihil? Optio modi laudantium quae voluptatibus,
          recusandae voluptate fugit delectus magni, cum veniam nihil voluptatem
          ab.
        </p>
      </div>
    </div>
  </div>
</div>
